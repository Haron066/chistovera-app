<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧистоВера Pro v4.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-active { background: #16a34a; color: white; border-color: #16a34a; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-900 pb-20">

    <header class="bg-white sticky top-0 z-[100] border-b p-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-green-600 italic tracking-tighter">ЧИСТОВЕРА</h1>
        <button id="admin-nav-btn" onclick="showTab('admin')" class="hidden bg-red-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black uppercase">Админ</button>
    </header>

    <main class="p-4">
        <!-- ВЫБОР ГОРОДА -->
        <div id="screen-city" class="hidden space-y-4 pt-10 text-center">
            <h2 class="text-2xl font-black">Где вы живете?</h2>
            <button onclick="pickCity('Магас')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm border font-bold text-lg active:scale-95 transition-all">🏙 Магас</button>
            <button onclick="pickCity('Назрань')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm border font-bold text-lg active:scale-95 transition-all">🏡 Назрань</button>
        </div>

        <!-- АДРЕС -->
        <div id="screen-address" class="hidden space-y-4">
            <button onclick="backToCity()" class="text-slate-400 text-xs font-bold">← НАЗАД</button>
            <h2 class="text-xl font-black">Укажите адрес</h2>
            <input id="in-street" type="text" placeholder="Улица" class="w-full p-4 rounded-2xl bg-white shadow-sm border-none outline-none focus:ring-2 ring-green-500">
            <div class="flex gap-2">
                <input id="in-house" type="text" placeholder="Дом" class="w-1/2 p-4 rounded-2xl bg-white shadow-sm border-none outline-none focus:ring-2 ring-green-500">
                <input id="in-flat" type="text" placeholder="Кв" class="w-1/2 p-4 rounded-2xl bg-white shadow-sm border-none outline-none focus:ring-2 ring-green-500">
            </div>
            <button onclick="finishReg()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-bold">ПОДТВЕРДИТЬ</button>
        </div>

        <!-- ГЛАВНАЯ -->
        <div id="tab-home" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50">
                <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest text-center">Ваш график</h3>
                <div id="schedule-box" class="mt-4 p-8 rounded-3xl bg-slate-50 text-center border border-slate-100">
                    <p id="removal-time-display" class="text-4xl font-black text-slate-800 italic uppercase">Ожидание...</p>
                    <p id="schedule-hint" class="text-[10px] text-slate-400 mt-2 font-bold uppercase italic">Админ назначит время</p>
                </div>
                
                <!-- Блок кнопок мусора -->
                <div id="trash-controls" class="hidden mt-4 space-y-2">
                    <button id="btn-trash-out" onclick="trashAction(true)" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-green-100">ВЫСТАВИЛ МУСОР</button>
                    <button id="btn-trash-cancel" onclick="trashAction(false)" class="hidden w-full bg-white border-2 border-red-500 text-red-500 py-3 rounded-2xl font-bold text-xs">ОТМЕНИТЬ ВЫНОС</button>
                </div>
            </div>

            <div onclick="showTab('shop')" class="bg-blue-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl active:scale-95 transition-all">
                <div><h3 class="text-lg font-black uppercase italic">Детские товары</h3><p class="text-blue-100 text-xs opacity-70">Доставка под дверь</p></div>
                <span class="text-3xl">🧸</span>
            </div>
        </div>

        <!-- МАГАЗИН -->
        <div id="tab-shop" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <button onclick="showTab('home')" class="text-slate-400 text-xs font-bold">← НАЗАД</button>
                <button onclick="toggleCart()" class="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase">🛒 (<span id="cart-count">0</span>)</button>
            </div>
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                <button onclick="filterShop('Все')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-[10px] font-black uppercase cat-active" id="cat-Все">Все</button>
                <button onclick="filterShop('Подгузники')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-[10px] font-black uppercase" id="cat-Подгузники">Подгузники</button>
                <button onclick="filterShop('Смеси')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-[10px] font-black uppercase" id="cat-Смеси">Смеси</button>
                <button onclick="filterShop('Салфетки')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-[10px] font-black uppercase" id="cat-Салфетки">Салфетки</button>
                <button onclick="filterShop('Пюре и соки')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-[10px] font-black uppercase" id="cat-Пюре и соки">Пюре и соки</button>
            </div>

            <div id="shop-items" class="grid grid-cols-2 gap-3 pb-24"></div>
        </div>

        <!-- КОРЗИНА -->
        <div id="modal-cart" class="hidden fixed inset-0 bg-slate-900/60 z-[200] flex items-end">
            <div class="bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black italic">Корзина</h3>
                    <button onclick="toggleCart()" class="bg-slate-100 p-2 rounded-full text-slate-400">✕</button>
                </div>
                <div id="cart-items-list" class="space-y-4 mb-8"></div>
                <button onclick="placeOrder()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black shadow-2xl">ЗАКАЗАТЬ</button>
            </div>
        </div>

        <!-- АДМИН -->
        <div id="tab-admin" class="hidden space-y-8 pb-24">
            <button onclick="showTab('home')" class="text-slate-400 text-xs font-bold">← ВЫЙТИ ИЗ АДМИНКИ</button>
            
            <!-- Добавить товар -->
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border">
                <h3 class="font-black text-[10px] mb-4 uppercase text-slate-400">Добавить товар</h3>
                <div class="space-y-3">
                    <input id="adm-p-name" type="text" placeholder="Название" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                    <input id="adm-p-price" type="number" placeholder="Цена" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                    <input id="adm-p-img" type="text" placeholder="URL картинки" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                    <select id="adm-p-cat" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm">
                        <option value="Подгузники">Подгузники</option>
                        <option value="Смеси">Смеси</option>
                        <option value="Салфетки">Салфетки</option>
                        <option value="Пюре и соки">Пюре и соки</option>
                    </select>
                    <button onclick="adminAddProduct()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black text-xs">ОПУБЛИКОВАТЬ</button>
                </div>
            </div>

            <!-- Управление адресами -->
            <div class="space-y-4">
                <h3 class="font-black text-slate-400 uppercase text-[10px] tracking-widest border-b pb-1 italic">Управление графиком</h3>
                <div id="admin-clients" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = 'https://gpreejfftspjqarthpfp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwcmVlamZmdHNwanFhcnRocGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzM4MDUsImV4cCI6MjA4Nzg0OTgwNX0.6u9FNjZLW3AVDY_RNLq4Dm8Yn4XC5JsI84aQlUKXI7c';
        const sb = supabase.createClient(S_URL, S_KEY);

        const ADMIN_ID = '593064482';
        const BOT_TOKEN = '8270034848:AAF9wQm0meVJ1jeflutjZfOO3OTG-_3QLfk';

        let curCat = 'Все';
        let myData = { tg_id: String(tg.initDataUnsafe?.user?.id || '593064482'), city: '', addr: '', cart: [], isAdmin: false };

        async function init() {
            if(myData.tg_id === ADMIN_ID) {
                myData.isAdmin = true;
                document.getElementById('admin-nav-btn').classList.remove('hidden');
            }

            const { data } = await sb.from('clients').select('*').eq('tg_id', myData.tg_id).single();
            if (data) {
                myData.city = data.city;
                myData.addr = data.address;
                showTab('home');
            } else {
                document.getElementById('screen-city').classList.remove('hidden');
            }
        }
        init();

        function pickCity(c) {
            myData.city = c;
            document.getElementById('screen-city').classList.add('hidden');
            document.getElementById('screen-address').classList.remove('hidden');
        }
        function backToCity() {
            document.getElementById('screen-address').classList.add('hidden');
            document.getElementById('screen-city').classList.remove('hidden');
        }

        async function finishReg() {
            const s = document.getElementById('in-street').value, h = document.getElementById('in-house').value, f = document.getElementById('in-flat').value;
            if(!s || !h) return tg.showAlert('Укажите адрес!');
            myData.addr = `${s}, ${h}, кв.${f}`;
            await sb.from('clients').upsert({ tg_id: myData.tg_id, city: myData.city, address: myData.addr, name: tg.initDataUnsafe?.user?.first_name || 'Клиент' });
            showTab('home');
        }

        async function showTab(t) {
            ['home', 'shop', 'admin'].forEach(id => document.getElementById('tab-'+id)?.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('navbar')?.classList.toggle('hidden', t === 'admin');

            if(t === 'home') {
                const { data } = await sb.from('clients').select('*').eq('tg_id', myData.tg_id).single();
                if(data && data.schedule) {
                    document.getElementById('removal-time-display').innerText = data.schedule;
                    document.getElementById('trash-controls').classList.remove('hidden');
                    updateTrashButtons(data.trash_out_today);
                }
            }
            if(t === 'shop') loadProducts();
            if(t === 'admin') loadAdminClients();
        }

        // --- ЛОГИКА МУСОРА ---
        function updateTrashButtons(isOut) {
            const btnMain = document.getElementById('btn-trash-out');
            const btnCancel = document.getElementById('btn-trash-cancel');
            if(isOut) {
                btnMain.innerText = '✅ МУСОР ПОДТВЕРЖДЕН';
                btnMain.classList.replace('bg-green-600', 'bg-slate-200');
                btnMain.classList.replace('text-white', 'text-slate-500');
                btnCancel.classList.remove('hidden');
            } else {
                btnMain.innerText = 'ВЫСТАВИЛ МУСОР';
                btnMain.classList.add('bg-green-600', 'text-white');
                btnMain.classList.remove('bg-slate-200', 'text-slate-500');
                btnCancel.classList.add('hidden');
            }
        }

        async function trashAction(isOut) {
            await sb.from('clients').update({ trash_out_today: isOut }).eq('tg_id', myData.tg_id);
            updateTrashButtons(isOut);
            
            const text = isOut ? `🔔 ВЫСТАВИЛ: ${myData.addr}` : `❌ ОТМЕНА: ${myData.addr}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}`);
            
            if(isOut) {
                tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 1500);
            }
        }

        // --- МАГАЗИН ---
        function filterShop(cat) {
            curCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('cat-active', b.id === 'cat-'+cat));
            loadProducts();
        }

        async function loadProducts() {
            let q = sb.from('products').select('*').order('id', {ascending: false});
            if(curCat !== 'Все') q = q.eq('category', curCat);
            const { data } = await q;
            const box = document.getElementById('shop-items');
            box.innerHTML = '';
            data.forEach(p => {
                box.innerHTML += `
                    <div class="bg-white p-4 rounded-[2rem] border relative flex flex-col h-full">
                        ${myData.isAdmin ? `<button onclick="deleteProduct(${p.id})" class="absolute top-2 right-2 bg-red-100 text-red-600 p-1 rounded-full text-[8px] font-bold">Удалить</button>` : ''}
                        <img src="${p.image_url}" class="h-20 w-full object-contain mb-2 bg-slate-50 rounded-xl">
                        <h4 class="text-[10px] font-bold leading-tight flex-grow uppercase">${p.name}</h4>
                        <div class="mt-3 flex items-center justify-between">
                            <span class="font-black text-sm">${p.price}₽</span>
                            <button onclick="addToCart(${p.id},'${p.name}',${p.price})" class="bg-green-600 text-white w-8 h-8 rounded-full font-bold">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id, name, price) {
            myData.cart.push({cid: Date.now(), id, name, price});
            document.getElementById('cart-count').innerText = myData.cart.length;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function toggleCart() {
            document.getElementById('modal-cart').classList.toggle('hidden');
            const list = document.getElementById('cart-items-list');
            list.innerHTML = myData.cart.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-xs">
                    <span>${i.name}</span>
                    <button onclick="removeFromCart(${i.cid})" class="text-red-500 font-bold ml-2">Удалить</button>
                </div>
            `).join('') || '<p class="text-center text-slate-400">Пусто</p>';
        }

        function removeFromCart(cid) {
            myData.cart = myData.cart.filter(i => i.cid !== cid);
            document.getElementById('cart-count').innerText = myData.cart.length;
            toggleCart(); toggleCart();
        }

        async function placeOrder() {
            if(!myData.cart.length) return;
            const names = myData.cart.map(i => i.name).join(', ');
            await sb.from('orders').insert({ client_tg_id: myData.tg_id, product_name: names });
            tg.showAlert('Заказ принят!');
            myData.cart = [];
            document.getElementById('cart-count').innerText = '0';
            toggleCart(); showTab('home');
        }

        // --- АДМИН ---
        async function adminAddProduct() {
            const n = document.getElementById('adm-p-name').value, p = document.getElementById('adm-p-price').value, i = document.getElementById('adm-p-img').value, c = document.getElementById('adm-p-cat').value;
            if(!n || !p || !i) return alert('Заполните всё!');
            await sb.from('products').insert({ name: n, price: parseInt(p), image_url: i, category: c });
            alert('Товар добавлен!');
            loadProducts();
        }

        async function deleteProduct(id) {
            if(confirm('Удалить товар?')) {
                await sb.from('products').delete().eq('id', id);
                loadProducts();
            }
        }

        async function loadAdminClients() {
            const { data } = await sb.from('clients').select('*').order('created_at', {ascending: false});
            const box = document.getElementById('admin-clients');
            box.innerHTML = data.map(c => `
                <div class="bg-white p-4 rounded-2xl border text-[11px] mb-2">
                    <p class="font-bold uppercase">${c.name} • ${c.city}</p>
                    <p class="text-slate-400 italic mb-3">${c.address}</p>
                    <div class="flex items-center gap-2">
                        <input type="time" id="time-${c.tg_id}" value="${c.schedule || ''}" class="p-2 border rounded-lg outline-none">
                        <button onclick="setTime('${c.tg_id}')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">ОК</button>
                    </div>
                </div>
            `).join('');
        }

        async function setTime(tid) {
            const val = document.getElementById('time-'+tid).value;
            await sb.from('clients').update({ schedule: val }).eq('tg_id', tid);
            alert('Время установлено!');
        }
    </script>

    <!-- NAVBAR (Главная / Магазин) -->
    <nav id="navbar" class="hidden fixed bottom-0 w-full bg-white border-t p-4 flex justify-around pb-10 z-50">
        <button onclick="showTab('home')" class="flex flex-col items-center text-slate-400 active:text-green-600">
            <span class="text-xl">🏠</span><span class="text-[9px] font-bold uppercase">Главная</span>
        </button>
        <button onclick="showTab('shop')" class="flex flex-col items-center text-slate-400 active:text-green-600">
            <span class="text-xl">📦</span><span class="text-[9px] font-bold uppercase">Магазин</span>
        </button>
    </nav>

</body>
</html>
