<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧистоВера 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
        .tab-active { color: #059669; border-top: 2px solid #059669; }
        .card-blur { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-24 text-slate-900">

    <!-- HEADER -->
    <header class="bg-white/80 sticky top-0 z-[100] backdrop-blur-md border-b border-slate-100 p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-green-600 italic tracking-tighter">ЧИСТОВЕРА</h1>
            <p id="sub-header" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Сервис заботы</p>
        </div>
        <button id="admin-btn" onclick="showTab('admin')" class="hidden bg-slate-100 p-2 rounded-xl text-xs font-bold text-slate-600">Админ</button>
    </header>

    <main class="p-4" id="main-content">
        
        <!-- REGISTRATION: CITY -->
        <div id="screen-city" class="hidden space-y-6 pt-6">
            <h2 class="text-2xl font-black text-center text-slate-800">В каком городе <br>вы живете?</h2>
            <div class="grid gap-4">
                <button onclick="pickCity('Магас')" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-left flex justify-between items-center active:scale-95 transition-all">
                    <span class="text-lg font-bold">🏙 Магас</span>
                    <span class="text-green-500">→</span>
                </button>
                <button onclick="pickCity('Назрань')" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-left flex justify-between items-center active:scale-95 transition-all">
                    <span class="text-lg font-bold">🏡 Назрань</span>
                    <span class="text-green-500">→</span>
                </button>
            </div>
        </div>

        <!-- REGISTRATION: ADDRESS -->
        <div id="screen-address" class="hidden space-y-4 pt-4">
            <button onclick="backToCity()" class="text-slate-400 text-sm font-bold flex items-center gap-1">← Назад к городам</button>
            <h2 class="text-xl font-black">Укажите адрес</h2>
            <div class="space-y-3">
                <input id="in-street" type="text" placeholder="Улица" class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 ring-green-500 bg-white outline-none">
                <div class="flex gap-3">
                    <input id="in-house" type="text" placeholder="Дом" class="w-1/2 p-4 rounded-2xl border-none shadow-sm focus:ring-2 ring-green-500 bg-white outline-none">
                    <input id="in-flat" type="text" placeholder="Кв" class="w-1/2 p-4 rounded-2xl border-none shadow-sm focus:ring-2 ring-green-500 bg-white outline-none">
                </div>
            </div>
            <button onclick="finishReg()" id="reg-btn" class="w-full bg-green-600 text-white p-5 rounded-2xl font-bold shadow-lg shadow-green-100 active:scale-95 transition-all">Подтвердить адрес</button>
        </div>

        <!-- TAB: HOME (Мусор) -->
        <div id="tab-home" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-50">
                <div class="flex justify-between">
                    <h3 class="text-lg font-black italic uppercase tracking-tight text-slate-800">Вынос мусора</h3>
                    <span id="badge-status" class="bg-orange-100 text-orange-600 text-[10px] px-2 py-1 rounded-full font-black uppercase">Проверка</span>
                </div>
                
                <div id="schedule-box" class="mt-6 p-6 rounded-2xl bg-slate-50 border border-slate-100 text-center space-y-2">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Ваш график</p>
                    <p id="removal-time" class="text-2xl font-black text-slate-800 italic">Ожидание...</p>
                    <p id="schedule-info" class="text-[10px] text-slate-400">Администратор назначит время в течение часа</p>
                </div>

                <button id="btn-trash" onclick="trashConfirm()" class="hidden w-full mt-4 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100">МУСОР ВЫСТАВЛЕН</button>
            </div>

            <div onclick="showTab('shop')" class="bg-blue-600 p-6 rounded-[32px] text-white flex justify-between items-center shadow-xl shadow-blue-100 active:scale-95 transition-all">
                <div>
                    <h3 class="text-lg font-black">Детские товары</h3>
                    <p class="text-blue-100 text-xs opacity-70">Заказать доставку под дверь</p>
                </div>
                <span class="text-2xl">🧸</span>
            </div>
        </div>

        <!-- TAB: SHOP -->
        <div id="tab-shop" class="hidden space-y-4 pt-2">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-black">Магазин</h2>
                <div id="cart-counter" class="bg-green-600 text-white px-3 py-1 rounded-full text-xs font-bold hidden">0 товаров</div>
            </div>
            <div id="shop-items" class="grid grid-cols-2 gap-3"></div>
            <button id="order-btn" onclick="placeOrder()" class="hidden sticky bottom-4 w-full bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-2xl">Оформить заказ</button>
        </div>

        <!-- TAB: ADMIN -->
        <div id="tab-admin" class="hidden space-y-6">
            <h2 class="text-xl font-black text-red-600 uppercase italic">Управление (Админ)</h2>
            <div class="space-y-4">
                <h3 class="font-bold border-b pb-2">Новые клиенты (без времени)</h3>
                <div id="admin-clients" class="space-y-2"></div>
                
                <h3 class="font-bold border-b pb-2 mt-8">Заказы товаров</h3>
                <div id="admin-orders" class="space-y-2"></div>
            </div>
        </div>

    </main>

    <!-- NAVIGATION -->
    <nav id="navbar" class="hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 flex justify-around pb-8 z-[100]">
        <button onclick="showTab('home')" id="nav-home" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-black uppercase tracking-widest">Главная</span>
        </button>
        <button onclick="showTab('shop')" id="nav-shop" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-xl">📦</span>
            <span class="text-[10px] font-black uppercase tracking-widest">Магазин</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = 'https://gpreejfftspjqarthpfp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwcmVlamZmdHNwanFhcnRocGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzM4MDUsImV4cCI6MjA4Nzg0OTgwNX0.6u9FNjZLW3AVDY_RNLq4Dm8Yn4XC5JsI84aQlUKXI7c';
        const sb = supabase.createClient(S_URL, S_KEY);

        // --- ТВОЙ ID ТУТ ЧТОБЫ ВИДЕТЬ АДМИНКУ ---
        const ADMIN_ID = '593064482'; // <--- ЗАМЕНИ НА СВОЙ ID
        // ----------------------------------------

        let user = { tg_id: String(tg.initDataUnsafe?.user?.id || 'test'), city: '', addr: '', cart: [] };

        async function init() {
            if(user.tg_id === ADMIN_ID) document.getElementById('admin-btn').classList.remove('hidden');

            const { data, error } = await sb.from('clients').select('*').eq('tg_id', user.tg_id).single();
            if (data) {
                user.city = data.city;
                user.addr = data.address;
                showTab('home');
                updateStatusUI(data);
            } else {
                document.getElementById('screen-city').classList.remove('hidden');
            }
        }
        init();

        // REG LOGIC
        function pickCity(c) {
            user.city = c;
            document.getElementById('screen-city').classList.add('hidden');
            document.getElementById('screen-address').classList.remove('hidden');
        }
        function backToCity() {
            document.getElementById('screen-address').classList.add('hidden');
            document.getElementById('screen-city').classList.remove('hidden');
        }
        async function finishReg() {
            const s = document.getElementById('in-street').value;
            const h = document.getElementById('in-house').value;
            const f = document.getElementById('in-flat').value;
            if(!s || !h) return alert('Укажите улицу и дом!');
            
            user.addr = `${s}, ${h}, кв.${f}`;
            await sb.from('clients').upsert({ 
                tg_id: user.tg_id, city: user.city, address: user.addr, name: tg.initDataUnsafe?.user?.first_name || 'Клиент' 
            });
            showTab('home');
        }

        // NAVIGATION
        function showTab(t) {
            ['home', 'shop', 'admin'].forEach(id => document.getElementById('tab-'+id)?.classList.add('hidden'));
            ['home', 'shop'].forEach(id => document.getElementById('nav-'+id)?.classList.remove('text-green-600'));
            
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(t !== 'admin') {
                document.getElementById('nav-'+t).classList.add('text-green-600');
                document.getElementById('navbar').classList.remove('hidden');
            }
            if(t === 'home') refreshStatus();
            if(t === 'shop') loadShop();
            if(t === 'admin') loadAdmin();
        }

        async function refreshStatus() {
            const { data } = await sb.from('clients').select('*').eq('tg_id', user.tg_id).single();
            updateStatusUI(data);
        }

        function updateStatusUI(data) {
            const timeEl = document.getElementById('removal_time');
            const badge = document.getElementById('badge-status');
            const btn = document.getElementById('btn-trash');

            if(data.schedule) {
                timeEl.innerText = data.schedule;
                badge.innerText = 'Активна';
                badge.classList.replace('bg-orange-100', 'bg-green-100');
                badge.classList.replace('text-orange-600', 'text-green-600');
                btn.classList.remove('hidden');
                document.getElementById('schedule-info').innerText = 'Пожалуйста, выставьте пакеты к этому времени';
            }
        }

        // SHOP LOGIC
        async function loadShop() {
            const { data } = await sb.from('products').select('*');
            const box = document.getElementById('shop-items');
            box.innerHTML = '';
            data.forEach(p => {
                box.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl border border-slate-50 flex flex-col h-full shadow-sm">
                        <img src="${p.image_url}" class="h-24 w-full object-contain mb-3 rounded-xl bg-slate-50">
                        <h4 class="text-[11px] font-bold leading-tight flex-grow">${p.name}</h4>
                        <div class="mt-4 flex items-center justify-between">
                            <span class="font-black text-sm">${p.price}₽</span>
                            <button onclick="addToCart('${p.name}')" class="bg-slate-900 text-white w-8 h-8 rounded-full font-bold">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(name) {
            user.cart.push(name);
            const counter = document.getElementById('cart-counter');
            counter.innerText = `${user.cart.length} товаров`;
            counter.classList.remove('hidden');
            document.getElementById('order-btn').classList.remove('hidden');
            tg.HapticFeedback.impactOccurred('light');
        }

        async function placeOrder() {
            const list = user.cart.join(', ');
            await sb.from('orders').insert({ client_tg_id: user.tg_id, product_name: list });
            tg.showAlert('Заказ оформлен! Мы скоро свяжемся с вами.');
            user.cart = [];
            showTab('home');
        }

        function trashConfirm() {
            const btn = document.getElementById('btn-trash');
            btn.innerText = '✅ УВЕДОМЛЕНИЕ ОТПРАВЛЕНО';
            btn.classList.replace('bg-green-600', 'bg-slate-100');
            btn.classList.replace('text-white', 'text-slate-400');
            tg.HapticFeedback.notificationOccurred('success');
        }

        // ADMIN LOGIC
        async function loadAdmin() {
            const clientsBox = document.getElementById('admin-clients');
            const ordersBox = document.getElementById('admin-orders');
            
            const { data: clients } = await sb.from('clients').select('*').is('schedule', null);
            clientsBox.innerHTML = clients?.length ? '' : '<p class="text-xs text-slate-400">Нет новых заявок</p>';
            clients?.forEach(c => {
                clientsBox.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm">
                        <p class="font-bold text-sm">${c.name} (${c.city})</p>
                        <p class="text-[10px] text-slate-400">${c.address}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="setSchedule('${c.tg_id}', '13:00')" class="bg-green-100 text-green-700 text-[10px] px-3 py-2 rounded-lg font-bold">13:00</button>
                            <button onclick="setSchedule('${c.tg_id}', '18:00')" class="bg-green-100 text-green-700 text-[10px] px-3 py-2 rounded-lg font-bold">18:00</button>
                            <button onclick="setSchedule('${c.tg_id}', '19:00')" class="bg-green-100 text-green-700 text-[10px] px-3 py-2 rounded-lg font-bold">19:00</button>
                        </div>
                    </div>
                `;
            });

            const { data: orders } = await sb.from('orders').select('*').order('created_at', {ascending: false});
            ordersBox.innerHTML = orders?.length ? '' : '<p class="text-xs text-slate-400">Нет заказов</p>';
            orders?.forEach(o => {
                ordersBox.innerHTML += `
                    <div class="bg-slate-50 p-3 rounded-xl border text-[10px]">
                        <p><b>Заказ:</b> ${o.product_name}</p>
                        <p><b>Дата:</b> ${new Date(o.created_at).toLocaleString()}</p>
                    </div>
                `;
            });
        }

        async function setSchedule(tgId, time) {
            await sb.from('clients').update({ schedule: time, status: 'active' }).eq('tg_id', tgId);
            alert('Время назначено!');
            loadAdmin();
        }

    </script>
</body>
</html>
    </script>
</body>
</html>
