<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧистоВера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-24 text-slate-900">

    <header class="bg-white sticky top-0 z-[100] border-b p-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-green-600 italic tracking-tighter">ЧИСТОВЕРА</h1>
        <button id="admin-nav-btn" onclick="showTab('admin')" class="hidden bg-red-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black uppercase">Админ</button>
    </header>

    <main class="p-4">
        <!-- ВЫБОР ГОРОДА -->
        <div id="screen-city" class="hidden space-y-4 pt-10 text-center">
            <h2 class="text-2xl font-black">Где вы живете?</h2>
            <button onclick="pickCity('Магас')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm border font-bold text-lg active:scale-95">🏙 Магас</button>
            <button onclick="pickCity('Назрань')" class="w-full bg-white p-6 rounded-[2rem] shadow-sm border font-bold text-lg active:scale-95">🏡 Назрань</button>
        </div>

        <!-- АДРЕС -->
        <div id="screen-address" class="hidden space-y-4">
            <button onclick="backToCity()" class="text-slate-400 text-xs font-bold">← НАЗАД</button>
            <h2 class="text-xl font-black">Ваш адрес</h2>
            <input id="in-street" type="text" placeholder="Улица" class="w-full p-4 rounded-2xl bg-white shadow-sm border-none outline-none focus:ring-2 ring-green-500">
            <div class="flex gap-2">
                <input id="in-house" type="text" placeholder="Дом" class="w-1/2 p-4 rounded-2xl bg-white shadow-sm border-none outline-none focus:ring-2 ring-green-500">
                <input id="in-flat" type="text" placeholder="Кв" class="w-1/2 p-4 rounded-2xl bg-white shadow-sm border-none outline-none focus:ring-2 ring-green-500">
            </div>
            <button onclick="finishReg()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black shadow-xl">ПОДТВЕРДИТЬ</button>
        </div>

        <!-- ГЛАВНАЯ -->
        <div id="tab-home" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50">
                <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest text-center">График выноса мусора</h3>
                <div id="schedule-box" class="mt-4 p-8 rounded-3xl bg-slate-50 text-center border border-slate-100">
                    <p id="removal-time-display" class="text-4xl font-black text-slate-800 italic uppercase">Ожидание...</p>
                    <p id="schedule-hint" class="text-[10px] text-slate-400 mt-2 font-bold uppercase tracking-tighter italic text-center">Админ назначит время</p>
                </div>
                <button id="btn-trash-action" onclick="trashConfirm()" class="hidden w-full mt-4 bg-green-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition-all">ВЫСТАВИЛ ПАКЕТЫ</button>
            </div>
        </div>

        <!-- МАГАЗИН -->
        <div id="tab-shop" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-2xl font-black italic">Магазин</h2>
                <button onclick="toggleCart()" class="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase">🛒 (<span id="cart-count">0</span>)</button>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="filterShop('Все')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-xs font-bold" id="cat-Все">Все</button>
                <button onclick="filterShop('Подгузники')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-xs font-bold" id="cat-Подгузники">Подгузники</button>
                <button onclick="filterShop('Смеси')" class="cat-btn flex-shrink-0 px-4 py-2 rounded-full bg-white border text-xs font-bold" id="cat-Смеси">Смеси</button>
            </div>
            <div id="shop-items" class="grid grid-cols-2 gap-3 pb-24"></div>
        </div>

        <!-- АДМИН -->
        <div id="tab-admin" class="hidden space-y-8 pb-24">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-black text-xs mb-4 uppercase text-slate-400 tracking-widest italic">Добавить товар</h3>
                <div class="space-y-3">
                    <input id="adm-p-name" type="text" placeholder="Название" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                    <input id="adm-p-price" type="number" placeholder="Цена" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                    <input id="adm-p-img" type="text" placeholder="URL картинки" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                    <select id="adm-p-cat" class="w-full p-3 rounded-xl bg-slate-50 border-none text-sm outline-none">
                        <option value="Подгузники">Подгузники</option>
                        <option value="Смеси">Смеси</option>
                        <option value="Салфетки">Салфетки</option>
                    </select>
                    <button onclick="adminAddProduct()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black text-xs uppercase">Опубликовать</button>
                </div>
            </div>
            <div class="space-y-4">
                <h3 class="font-black text-slate-400 uppercase text-[10px] tracking-widest border-b pb-1 italic">Новые адреса</h3>
                <div id="admin-pending-clients" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- МЕНЮ -->
    <nav id="navbar" class="hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 flex justify-around pb-10 z-50">
        <button onclick="showTab('home')" id="nav-home" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-xl font-bold">🏠</span>
            <span class="text-[9px] font-black uppercase tracking-widest tracking-tighter">Главная</span>
        </button>
        <button onclick="showTab('shop')" id="nav-shop" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-xl font-bold">📦</span>
            <span class="text-[9px] font-black uppercase tracking-widest tracking-tighter">Магазин</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = 'https://gpreejfftspjqarthpfp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwcmVlamZmdHNwanFhcnRocGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzM4MDUsImV4cCI6MjA4Nzg0OTgwNX0.6u9FNjZLW3AVDY_RNLq4Dm8Yn4XC5JsI84aQlUKXI7c';
        const sb = supabase.createClient(S_URL, S_KEY);

        const ADMIN_ID = '593064482';
        const BOT_TOKEN = '8270034848:AAF9wQm0meVJ1jeflutjZfOO3OTG-_3QLfk'; // Твой токен

        let myData = { tg_id: String(tg.initDataUnsafe?.user?.id || '593064482'), city: '', addr: '', cart: [] };

        async function init() {
            if(myData.tg_id === ADMIN_ID) document.getElementById('admin-nav-btn').classList.remove('hidden');
            const { data } = await sb.from('clients').select('*').eq('tg_id', myData.tg_id).single();
            if (data) {
                myData.city = data.city;
                myData.addr = data.address;
                showTab('home');
            } else {
                document.getElementById('screen-city').classList.remove('hidden');
            }
        }
        init();

        function pickCity(c) {
            myData.city = c;
            document.getElementById('screen-city').classList.add('hidden');
            document.getElementById('screen-address').classList.remove('hidden');
        }

        async function finishReg() {
            const s = document.getElementById('in-street').value, h = document.getElementById('in-house').value, f = document.getElementById('in-flat').value;
            if(!s || !h) return alert('Укажите адрес!');
            myData.addr = `${s}, ${h}, кв.${f}`;
            await sb.from('clients').upsert({ tg_id: myData.tg_id, city: myData.city, address: myData.addr, name: tg.initDataUnsafe?.user?.first_name || 'Клиент' });
            showTab('home');
        }

        async function showTab(t) {
            ['home', 'shop', 'admin'].forEach(id => document.getElementById('tab-'+id)?.classList.add('hidden'));
            ['home', 'shop'].forEach(id => document.getElementById('nav-'+id)?.classList.replace('text-green-600', 'text-slate-300'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(t !== 'admin') {
                document.getElementById('nav-'+t).classList.replace('text-slate-300', 'text-green-600');
                document.getElementById('navbar').classList.remove('hidden');
            }
            if(t === 'home') {
                const { data } = await sb.from('clients').select('*').eq('tg_id', myData.tg_id).single();
                if(data && data.schedule) {
                    document.getElementById('removal-time-display').innerText = data.schedule;
                    document.getElementById('btn-trash-action').classList.remove('hidden');
                }
            }
        }

        // --- ГЛАВНАЯ ФУНКЦИЯ УВЕДОМЛЕНИЯ ---
        async function trashConfirm() {
            const btn = document.getElementById('btn-trash-action');
            btn.innerText = 'ОТПРАВКА...';
            btn.disabled = true;

            const text = `🔔 МУСОР ВЫСТАВЛЕН!\n\n👤 Клиент: ${tg.initDataUnsafe?.user?.first_name || 'Клиент'}\n📍 Адрес: ${myData.addr}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}`;

            try {
                await fetch(url); // Отправляем сообщение напрямую через Telegram API
                tg.HapticFeedback.notificationOccurred('success');
                tg.close(); // Закрываем приложение
            } catch (e) {
                alert('Ошибка сети. Попробуйте еще раз.');
                btn.innerText = 'ВЫСТАВИЛ МУСОР';
                btn.disabled = false;
            }
        }

        // Остальные функции магазина (упрощенно для краткости)
        async function loadProducts() { /* как было раньше */ }
    </script>
</body>
</html>
