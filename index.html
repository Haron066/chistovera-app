<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧистоВера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем библиотеку Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <header class="bg-white p-4 shadow-sm flex justify-between items-center">
        <h1 class="text-xl font-bold text-green-600">ЧистоВера</h1>
        <p id="status" class="text-[10px] text-gray-400 uppercase font-bold">Магас • Назрань</p>
    </header>

    <main class="flex-grow p-4">
        <!-- Шаг 1: Город -->
        <div id="step-1" class="space-y-4 pt-10">
            <h2 class="text-center text-xl font-semibold">Выберите ваш город</h2>
            <button onclick="setCity('Магас')" class="w-full bg-white p-6 rounded-2xl shadow-sm border-2 border-transparent active:border-green-500 text-left flex justify-between">
                <span class="text-lg font-bold">🏙 Магас</span>
                <span>→</span>
            </button>
            <button onclick="setCity('Назрань')" class="w-full bg-white p-6 rounded-2xl shadow-sm border-2 border-transparent active:border-green-500 text-left flex justify-between">
                <span class="text-lg font-bold">🏡 Назрань</span>
                <span>→</span>
            </button>
        </div>

        <!-- Шаг 2: Адрес -->
        <div id="step-2" class="hidden space-y-4 pt-5">
            <h2 class="text-xl font-semibold">Введите адрес</h2>
            <input id="street" type="text" placeholder="Улица" class="w-full p-4 rounded-xl border focus:ring-2 ring-green-500 outline-none">
            <div class="flex gap-2">
                <input id="house" type="text" placeholder="Дом" class="w-1/2 p-4 rounded-xl border focus:ring-2 ring-green-500 outline-none">
                <input id="flat" type="text" placeholder="Кв" class="w-1/2 p-4 rounded-xl border focus:ring-2 ring-green-500 outline-none">
            </div>
            <button id="save-btn" onclick="saveToDb()" class="w-full bg-green-500 text-white p-4 rounded-xl font-bold">Подтвердить адрес</button>
        </div>

        <!-- Шаг 3: Главная -->
        <div id="step-3" class="hidden space-y-6 pt-5 text-center">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-500">Ваш адрес успешно сохранен!</p>
                <h3 id="display-address" class="font-bold text-lg mt-2 text-green-600"></h3>
                <div class="mt-6 p-4 bg-yellow-50 rounded-xl text-yellow-700 text-sm">
                    Подписка на вынос мусора временно не активна. Мы свяжемся с вами!
                </div>
            </div>
        </div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ВСТАВЬ СВОИ ДАННЫЕ ТУТ ---
        const SUPABASE_URL = 'ТВОЙ_URL_ИЗ_СКРИНШОТА';
        const SUPABASE_KEY = 'ТВОЙ_ANON_KEY';
        // ------------------------------

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let clientData = {
            city: '',
            tg_id: tg.initDataUnsafe?.user?.id || 0,
            name: tg.initDataUnsafe?.user?.first_name || 'Аноним'
        };

        function setCity(city) {
            clientData.city = city;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        async function saveToDb() {
            const btn = document.getElementById('save-btn');
            const street = document.getElementById('street').value;
            const house = document.getElementById('house').value;
            const flat = document.getElementById('flat').value;
            
            if(!street || !house) return alert('Заполните адрес!');

            const fullAddress = `${street}, д.${house}, кв.${flat}`;
            btn.innerText = 'Сохранение...';
            btn.disabled = true;

            const { error } = await supabase
                .from('clients')
                .upsert({ 
                    tg_id: String(clientData.tg_id), 
                    name: clientData.name, 
                    city: clientData.city, 
                    address: fullAddress 
                });

            if (error) {
                alert('Ошибка: ' + error.message);
                btn.innerText = 'Попробовать снова';
                btn.disabled = false;
            } else {
                showFinal(fullAddress);
            }
        }

        function showFinal(addr) {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('display-address').innerText = addr;
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
