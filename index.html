<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧистоВера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Библиотека Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
        .active-nav { color: #059669; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- Шапка -->
    <header class="bg-white p-4 shadow-sm border-b flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black text-green-600 tracking-tighter">ЧИСТОВЕРА</h1>
        <div id="city-badge" class="text-[10px] bg-gray-100 px-2 py-1 rounded-full font-bold text-gray-500 uppercase">Ингушетия</div>
    </header>

    <main class="flex-grow p-4 pb-24">
        
        <!-- ЭКРАН ЗАГРУЗКИ (пока проверяем базу) -->
        <div id="loading-screen" class="pt-20 text-center">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full"></div>
            <p class="mt-4 text-gray-400">Загрузка...</p>
        </div>

        <!-- ЭКРАН РЕГИСТРАЦИИ -->
        <div id="reg-section" class="hidden space-y-4">
            <div id="step-city" class="space-y-4 pt-4">
                <h2 class="text-center font-bold text-lg">Выберите ваш город</h2>
                <button onclick="selectCity('Магас')" class="w-full bg-white p-5 rounded-2xl shadow-sm border text-left flex justify-between items-center active:scale-95 transition-all">
                    <span class="font-bold">🏙 Магас</span> <span>→</span>
                </button>
                <button onclick="selectCity('Назрань')" class="w-full bg-white p-5 rounded-2xl shadow-sm border text-left flex justify-between items-center active:scale-95 transition-all">
                    <span class="font-bold">🏡 Назрань</span> <span>→</span>
                </button>
            </div>

            <div id="step-address" class="hidden space-y-4 pt-4">
                <h2 class="font-bold text-lg text-gray-800">Укажите точный адрес</h2>
                <input id="in-street" type="text" placeholder="Улица" class="w-full p-4 rounded-xl border-gray-200 border outline-none focus:border-green-500 bg-white">
                <div class="flex gap-2">
                    <input id="in-house" type="text" placeholder="Дом" class="w-1/2 p-4 rounded-xl border-gray-200 border outline-none focus:border-green-500 bg-white">
                    <input id="in-flat" type="text" placeholder="Кв" class="w-1/2 p-4 rounded-xl border-gray-200 border outline-none focus:border-green-500 bg-white">
                </div>
                <button onclick="saveProfile()" id="save-profile-btn" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-green-100 active:scale-95 transition-all">
                    Сохранить и начать
                </button>
            </div>
        </div>

        <!-- ЭКРАН: ГЛАВНАЯ -->
        <div id="tab-home" class="hidden space-y-4 animate-in fade-in duration-300">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-50">
                <div class="flex justify-between items-start">
                    <h3 class="text-xl font-bold">Вынос мусора</h3>
                    <span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded-full font-bold uppercase">Подписка</span>
                </div>
                <p id="client-addr-view" class="text-gray-400 text-xs mt-1 italic"></p>
                <div class="mt-6 p-5 bg-gray-50 rounded-2xl border border-dashed border-gray-200 text-center">
                    <p class="text-gray-500 text-xs">График обхода в вашем доме:</p>
                    <p class="font-black text-xl text-gray-800">Сегодня 13:00</p>
                    <button onclick="confirmTrash()" id="trash-btn" class="w-full mt-4 bg-white border-2 border-green-500 text-green-600 py-3 rounded-xl font-bold active:bg-green-500 active:text-white transition-all">Мусор выставлен</button>
                </div>
            </div>
            
            <div class="bg-gradient-to-br from-blue-600 to-blue-400 p-6 rounded-3xl text-white shadow-lg relative overflow-hidden active:scale-95 transition-all" onclick="showTab('shop')">
                <h3 class="text-lg font-bold">Детские товары</h3>
                <p class="text-blue-100 text-sm opacity-80">Доставка прямо до двери</p>
                <div class="mt-4 inline-block bg-white/20 px-4 py-1 rounded-full text-xs font-bold backdrop-blur-md">Смотреть каталог →</div>
                <div class="absolute -right-4 -bottom-4 text-7xl opacity-20">🧸</div>
            </div>
        </div>

        <!-- ЭКРАН: МАГАЗИН -->
        <div id="tab-shop" class="hidden space-y-4 animate-in fade-in duration-300">
            <h2 class="text-xl font-bold px-2 text-gray-800">Детские товары</h2>
            <div id="product-list" class="grid grid-cols-2 gap-3">
                <!-- Товары -->
            </div>
        </div>

    </main>

    <!-- Нижнее меню -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 w-full bg-white border-t border-gray-100 p-3 flex justify-around items-center pb-8 z-50">
        <button onclick="showTab('home')" id="nav-home" class="flex flex-col items-center transition-all">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">Главная</span>
        </button>
        <button onclick="showTab('shop')" id="nav-shop" class="flex flex-col items-center transition-all">
            <span class="text-xl">📦</span>
            <span class="text-[10px] font-bold">Магазин</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = 'https://gpreejfftspjqarthpfp.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwcmVlamZmdHNwanFhcnRocGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzM4MDUsImV4cCI6MjA4Nzg0OTgwNX0.6u9FNjZLW3AVDY_RNLq4Dm8Yn4XC5JsI84aQlUKXI7c';
        
        // Создаем клиент правильно
        const sb = supabase.createClient(S_URL, S_KEY);

        let myData = { 
            city: '', 
            addr: '', 
            tg_id: String(tg.initDataUnsafe?.user?.id || 'test_user') 
        };

        // 1. Инициализация при запуске
        async function init() {
            try {
                const { data, error } = await sb.from('clients').select('*').eq('tg_id', myData.tg_id).single();
                
                document.getElementById('loading-screen').classList.add('hidden');

                if (data) {
                    myData.city = data.city;
                    myData.addr = data.address;
                    showTab('home');
                } else {
                    document.getElementById('reg-section').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('reg-section').classList.remove('hidden');
            }
        }
        init();

        // 2. Логика выбора города и сохранения
        function selectCity(c) {
            myData.city = c;
            document.getElementById('step-city').classList.add('hidden');
            document.getElementById('step-address').classList.remove('hidden');
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function saveProfile() {
            const btn = document.getElementById('save-profile-btn');
            const street = document.getElementById('in-street').value;
            const house = document.getElementById('in-house').value;
            const flat = document.getElementById('in-flat').value;

            if(!street || !house) {
                tg.showAlert('Пожалуйста, укажите адрес');
                return;
            }

            btn.innerText = 'Сохранение...';
            myData.addr = `${street}, д.${house}, кв.${flat}`;

            const { error } = await sb.from('clients').upsert({ 
                tg_id: myData.tg_id, 
                city: myData.city, 
                address: myData.addr, 
                name: tg.initDataUnsafe?.user?.first_name || 'Клиент' 
            });

            if(error) {
                alert('Ошибка: ' + error.message);
                btn.innerText = 'Продолжить';
            } else {
                showTab('home');
            }
        }

        // 3. Переключение вкладок
        function showTab(t) {
            // Прячем всё
            document.getElementById('reg-section').classList.add('hidden');
            document.getElementById('tab-home').classList.add('hidden');
            document.getElementById('tab-shop').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');

            // Сбрасываем цвета меню
            document.getElementById('nav-home').classList.remove('text-green-600');
            document.getElementById('nav-home').classList.add('text-gray-300');
            document.getElementById('nav-shop').classList.remove('text-green-600');
            document.getElementById('nav-shop').classList.add('text-gray-300');

            // Показываем нужный экран
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('nav-' + t).classList.add('text-green-600');
            document.getElementById('nav-' + t).classList.remove('text-gray-300');

            if(t === 'home') {
                document.getElementById('client-addr-view').innerText = myData.addr;
                document.getElementById('city-badge').innerText = myData.city;
            }
            if(t === 'shop') loadProducts();
        }

        // 4. Загрузка товаров
        async function loadProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10">Загрузка товаров...</p>';

            const { data, error } = await sb.from('products').select('*');
            
            if(data) {
                list.innerHTML = '';
                data.forEach(p => {
                    list.innerHTML += `
                        <div class="bg-white p-3 rounded-3xl border border-gray-100 shadow-sm flex flex-col h-full">
                            <img src="${p.image_url}" class="h-28 w-full object-contain mb-2 rounded-2xl bg-gray-50">
                            <h4 class="text-[11px] font-bold text-gray-700 leading-tight flex-grow">${p.name}</h4>
                            <div class="mt-3 flex items-center justify-between">
                                <span class="text-sm font-black text-gray-900">${p.price} ₽</span>
                                <button onclick="orderProduct('${p.name}')" class="bg-gray-900 text-white p-2 rounded-xl active:bg-green-600 transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // 5. Заказ товара
        async function orderProduct(pName) {
            const { error } = await sb.from('orders').insert({ 
                client_tg_id: myData.tg_id, 
                product_name: pName 
            });
            
            if(!error) {
                tg.showAlert('✅ Заказ на "' + pName + '" принят! Курьер свяжется с вами.');
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        // 6. Подтверждение мусора
        function confirmTrash() {
            const btn = document.getElementById('trash-btn');
            btn.innerText = '✅ Уведомление отправлено';
            btn.classList.replace('text-green-600', 'text-green-800');
            btn.classList.add('bg-green-50', 'border-transparent');
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
