<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧистоВера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <header class="bg-white p-4 shadow-sm border-b flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black text-green-600 tracking-tighter">ЧИСТОВЕРА</h1>
        <div id="city-badge" class="text-[10px] bg-gray-100 px-2 py-1 rounded-full font-bold text-gray-500 uppercase">Ингушетия</div>
    </header>

    <main class="flex-grow p-4 pb-24">
        
        <!-- ЭКРАН 1: РЕГИСТРАЦИЯ (скрывается если адрес есть) -->
        <div id="reg-section" class="space-y-4">
            <div id="step-city" class="space-y-4">
                <h2 class="text-center font-bold text-lg mt-4">Выберите город</h2>
                <button onclick="selectCity('Магас')" class="w-full bg-white p-5 rounded-2xl shadow-sm border text-left flex justify-between items-center">
                    <span class="font-bold">🏙 Магас</span> <span>→</span>
                </button>
                <button onclick="selectCity('Назрань')" class="w-full bg-white p-5 rounded-2xl shadow-sm border text-left flex justify-between items-center">
                    <span class="font-bold">🏡 Назрань</span> <span>→</span>
                </button>
            </div>

            <div id="step-address" class="hidden space-y-4">
                <h2 class="font-bold text-lg">Ваш адрес</h2>
                <input id="in-street" type="text" placeholder="Улица" class="w-full p-4 rounded-xl border outline-none focus:border-green-500">
                <div class="flex gap-2">
                    <input id="in-house" type="text" placeholder="Дом" class="w-1/2 p-4 rounded-xl border outline-none focus:border-green-500">
                    <input id="in-flat" type="text" placeholder="Кв" class="w-1/2 p-4 rounded-xl border outline-none focus:border-green-500">
                </div>
                <button onclick="saveProfile()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">Продолжить</button>
            </div>
        </div>

        <!-- ЭКРАН 2: ГЛАВНАЯ (ВЫНОС МУСОРА) -->
        <div id="tab-home" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-50">
                <div class="flex justify-between items-start">
                    <h3 class="text-xl font-bold">Вынос мусора</h3>
                    <span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded-full font-bold">ПОДПИСКА</span>
                </div>
                <p id="client-addr-view" class="text-gray-400 text-xs mt-1 italic"></p>
                <div class="mt-6 p-4 bg-gray-50 rounded-2xl border text-center">
                    <p class="text-gray-500 text-sm">Ближайший обход: <span class="font-bold text-black">Сегодня 13:00</span></p>
                    <button onclick="confirmTrash()" id="trash-btn" class="w-full mt-4 bg-white border-2 border-green-500 text-green-600 py-3 rounded-xl font-bold active:scale-95 transition-all">Мусор выставлен</button>
                </div>
            </div>
            
            <div class="bg-gradient-to-r from-blue-600 to-blue-400 p-6 rounded-3xl text-white shadow-lg relative overflow-hidden">
                <h3 class="text-lg font-bold">Детские товары</h3>
                <p class="text-blue-100 text-sm opacity-80">Бесконтактная доставка под дверь</p>
                <button onclick="showTab('shop')" class="mt-4 bg-white text-blue-600 px-6 py-2 rounded-full font-bold text-sm">В магазин</button>
                <div class="absolute -right-4 -bottom-4 text-6xl opacity-20">🧸</div>
            </div>
        </div>

        <!-- ЭКРАН 3: МАГАЗИН -->
        <div id="tab-shop" class="hidden space-y-4">
            <h2 class="text-xl font-bold px-2">Каталог товаров</h2>
            <div id="product-list" class="grid grid-cols-2 gap-3">
                <!-- Товары загрузятся сюда -->
            </div>
        </div>

    </main>

    <!-- Нижнее меню -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 w-full bg-white border-t border-gray-100 p-3 flex justify-around items-center pb-8 z-50">
        <button onclick="showTab('home')" id="nav-home" class="flex flex-col items-center text-green-600 transition-all">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">Главная</span>
        </button>
        <button onclick="showTab('shop')" id="nav-shop" class="flex flex-col items-center text-gray-300 transition-all">
            <span class="text-xl">📦</span>
            <span class="text-[10px] font-bold">Магазин</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://gpreejfftspjqarthpfp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwcmVlamZmdHNwanFhcnRocGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzM4MDUsImV4cCI6MjA4Nzg0OTgwNX0.6u9FNjZLW3AVDY_RNLq4Dm8Yn4XC5JsI84aQlUKXI7c';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myData = { city: '', addr: '', tg_id: String(tg.initDataUnsafe?.user?.id || 'test') };

        // Инициализация
        async function init() {
            const { data } = await supabase.from('clients').select('*').eq('tg_id', myData.tg_id).single();
            if (data) {
                myData.city = data.city;
                myData.addr = data.address;
                showTab('home');
            }
        }
        init();

        function selectCity(c) {
            myData.city = c;
            document.getElementById('step-city').classList.add('hidden');
            document.getElementById('step-address').classList.remove('hidden');
        }

        async function saveProfile() {
            const street = document.getElementById('in-street').value;
            const house = document.getElementById('in-house').value;
            const flat = document.getElementById('in-flat').value;
            if(!street || !house) return alert('Укажите адрес!');

            myData.addr = `${street}, д.${house}, кв.${flat}`;
            await supabase.from('clients').upsert({ tg_id: myData.tg_id, city: myData.city, address: myData.addr, name: tg.initDataUnsafe?.user?.first_name });
            showTab('home');
        }

        function showTab(t) {
            document.getElementById('reg-section').classList.add('hidden');
            document.getElementById('tab-home').classList.add('hidden');
            document.getElementById('tab-shop').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');

            document.getElementById('nav-home').classList.replace('text-green-600', 'text-gray-300');
            document.getElementById('nav-shop').classList.replace('text-green-600', 'text-gray-300');

            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('nav-' + t).classList.replace('text-gray-300', 'text-green-600');
            
            if(t === 'home') document.getElementById('client-addr-view').innerText = myData.addr;
            if(t === 'shop') loadProducts();
        }

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*');
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            data.forEach(p => {
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex flex-col">
                        <img src="${p.image_url}" class="h-24 w-full object-contain mb-2 rounded-lg">
                        <h4 class="text-[11px] font-bold leading-tight h-8">${p.name}</h4>
                        <p class="text-green-600 font-black mt-2">${p.price} ₽</p>
                        <button onclick="orderProduct('${p.name}')" class="mt-2 bg-gray-900 text-white text-[10px] py-2 rounded-xl font-bold active:bg-green-600">Заказать</button>
                    </div>
                `;
            });
        }

        async function orderProduct(name) {
            await supabase.from('orders').insert({ client_tg_id: myData.tg_id, product_name: name });
            tg.showAlert('Заказ принят! Мы свяжемся с вами для уточнения деталей.');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function confirmTrash() {
            const btn = document.getElementById('trash-btn');
            btn.innerText = '✅ Курьер уведомлен';
            btn.classList.add('bg-green-50', 'border-transparent');
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
    </script>
</body>
</html>
